<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎙️ 회의록 자동 분석</h1>
            <p class="subtitle">녹음하고, 분석하고, 슬랙으로 공유하세요</p>
        </header>

        <main>
            <!-- 설정 -->
            <section class="key-section" id="keySection">
                <div class="key-card">
                    <div class="setting-row">
                        <p class="key-label">🔑 Gemini API Key</p>
                        <div class="key-input-wrap">
                            <input type="password" id="apiKeyInput" placeholder="AIza... 키를 입력하세요" autocomplete="off">
                            <button id="saveKeyBtn" class="btn btn-primary btn-sm">저장</button>
                        </div>
                        <p class="key-status" id="keyStatus"></p>
                    </div>
                    <div class="setting-row" style="margin-top:16px">
                        <p class="key-label">💬 Slack Webhook URL</p>
                        <div class="key-input-wrap">
                            <input type="password" id="slackUrlInput" placeholder="https://hooks.slack.com/services/..." autocomplete="off">
                            <button id="saveSlackBtn" class="btn btn-primary btn-sm">저장</button>
                        </div>
                        <p class="key-status" id="slackStatus"></p>
                    </div>
                    <p class="key-hint">모든 정보는 브라우저에만 저장되며 외부로 전송되지 않습니다</p>
                </div>
            </section>

            <!-- 녹음 -->
            <section class="recorder-section" id="recorderSection">
                <div class="recorder-card">
                    <div class="timer" id="timer">00:00</div>
                    <div class="waveform">
                        <canvas id="visualizer" width="400" height="80"></canvas>
                    </div>
                    <div class="controls">
                        <button id="recordBtn" class="btn btn-record" aria-label="녹음 시작">
                            <span class="record-icon"></span> 녹음 시작
                        </button>
                        <button id="stopBtn" class="btn btn-stop" disabled aria-label="녹음 중지">
                            ⏹ 중지
                        </button>
                    </div>
                </div>
            </section>

            <!-- 상태 -->
            <section class="status-section" id="statusSection" hidden>
                <div class="status-card">
                    <div class="spinner"></div>
                    <p id="statusText">분석 중...</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </section>

            <!-- 결과 -->
            <section class="result-section" id="resultSection" hidden>
                <div class="result-card">
                    <div class="tabs">
                        <button class="tab active" data-tab="summary">📋 분석 결과</button>
                        <button class="tab" data-tab="transcript">📝 녹취록</button>
                    </div>
                    <div class="tab-content" id="summaryTab"></div>
                    <div class="tab-content" id="transcriptTab" hidden></div>
                    <div class="actions">
                        <button id="slackBtn" class="btn btn-slack">💬 Slack 전송</button>
                        <button id="copyBtn" class="btn btn-copy">📋 복사</button>
                        <button id="resetBtn" class="btn btn-reset">🔄 새 녹음</button>
                    </div>
                </div>
            </section>

            <div id="toast" class="toast" hidden></div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
